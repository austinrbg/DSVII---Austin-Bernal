<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Productos con Fetch</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">CRUD de Productos - Fetch + PHP + MySQL</h4>
            </div>

            <div class="card-body">

                <form id="formProducto">
                    <input type="hidden" name="Id" id="Id">

                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label for="Codigo" class="form-label">Código</label>
                            <input type="text" class="form-control" name="Codigo" id="Codigo" required>
                        </div>

                        <div class="col-md-3">
                            <label for="Producto" class="form-label">Producto</label>
                            <input type="text" class="form-control" name="Producto" id="Producto" required>
                        </div>

                        <div class="col-md-3">
                            <label for="Precio" class="form-label">Precio</label>
                            <input type="number" class="form-control" name="Precio" id="Precio" step="0.01" min="0" required>
                        </div>

                        <div class="col-md-3">
                            <label for="Cantidad" class="form-label">Cantidad</label>
                            <input type="number" class="form-control" name="Cantidad" id="Cantidad" step="1" min="0" required>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" id="btnGuardar" class="btn btn-success">
                            Registrar
                        </button>

                        <button type="button" id="btnCancelar" class="btn btn-secondary">
                            Cancelar
                        </button>
                    </div>
                </form>

            </div>
        </div>

        <div class="card shadow mt-4">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Buscar productos</h5>
            </div>

            <div class="card-body">
                <div class="row">
                    <div class="col-md-9">
                        <input type="text" id="TextoBuscar" class="form-control" placeholder="Buscar por código o nombre del producto">
                    </div>

                    <div class="col-md-3 d-grid">
                        <button type="button" id="btnBuscar" class="btn btn-primary">
                            Buscar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow mt-4 mb-5">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0">Listado de productos</h5>
            </div>

            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Código</th>
                                <th>Producto</th>
                                <th>Precio</th>
                                <th>Cantidad</th>
                                <th>Acción</th>
                            </tr>
                        </thead>

                        <tbody id="tablaProductos">
                            <tr>
                                <td colspan="6" class="text-center">Cargando productos...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>

</body>
</html>
